services:
  mysql:
    container_name: mysql
    image: mysql
    ports:
      - 3306:3306
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: '!@Skdud340'

  redis:
    container_name: redis
    image: redis
    ports:
      - 6379:6379

  backend:
    container_name: backend
    image: nayoun340/springcommunity
    expose:
      - 8080
    ports:
      - 8080:8080
    depends_on:
      - mysql
      - redis