name: 'SpringCommunity_CI' # Github Actions 워크플로우의 이름 지정

on: # 워크플로우가 언제 실행될지 정의
  push: # 지정한 브랜치로 코드가 푸시될 때 워크플로우 실행
    branches: [ main, feature/* ] # main, feature/* 패턴에 해당하는 모든 브랜치
  pull_request: # 지정한 브랜치로 PR이 생성될 때 실행
    branches: [ main, feature/* ] # main, feature/* 패턴에 해당하는 모든 브랜치

jobs: # 여러 개의 작업을 정의
  ci: # 작업(job)의 이름
    runs-on: ubuntu-latest # 이 작업이 실행될 환경 지정
    steps: # ci라는 작업에 대한 실행될 행동들 정의
      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Checkout code # 코드 체크아웃 단계
        uses: actions/checkout@v4

      - name: Set up Java # Java 환경 설정
        uses: actions/setup-java@v2
        with:
          distribution: 'adopt'
          java-version: '17'

      # MySQL 서비스 설정
      - name: Setup MySQL Service
        uses: mysql-actions/setup-mysql@v1
        with:
          mysql version: '8.0'
          mysql database: 'springcommunity'
          mysql user: 'test'
          mysql password: ${{ secrets.MYSQL_PASSWORD }}
          root password: ${{ secrets.MYSQL_ROOT_PASSWORD }}

      # MySQL이 완전히 시작될 때까지 대기
      - name: Wait for MySQL to start
        run: |
          for i in {30..0}; do
            if mysqladmin ping -h "127.0.0.1" --silent; then
              break
            fi
            echo 'Waiting for MySQL to start...'
            sleep 1
          done
          if [ "$i" = 0 ]; then
            echo 'MySQL did not start in time.'
            exit 1
          fi

      # application.properties 파일 생성
      - name: Create application.properties
        run: |
          mkdir -p src/main/resources
          echo "spring.datasource.url=jdbc:mysql://127.0.0.1:3306/springcommunity" > src/main/resources/application.properties
          echo "spring.datasource.username=test" >> src/main/resources/application.properties
          echo "spring.datasource.password=${{ secrets.MYSQL_PASSWORD }}" >> src/main/resources/application.properties

      - name: Run tests # 테스트 실행 단계
        run: |
          chmod +x ./gradlew
          ./gradlew clean test
