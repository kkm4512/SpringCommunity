name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/*
# 테스트//
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: mysql:8.0
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        env:
          MYSQL_ROOT_PASSWORD: '!@Skdud340'
          MYSQL_DATABASE: springcommunity
      redis:
        image: redis:6.0
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Java 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Tests
        env:
          MYSQL_HOST: 127.0.0.1  # 서비스 연결을 위해 localhost 사용
          MYSQL_PORT: 3307
          MYSQL_DB_NAME: springcommunity
          MYSQL_NAME: root
          MYSQL_PASSWORD: '!@Skdud340'
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          JWT_SECRET_KEY: RGVjb2RlIGZyb20gQmFzZTY0IGZvcm1hdFNpbXBseSBlbnRlciB5b3VyIGRhdGEgdGhlbi
          JWT_EXPIRED_TIME: 86400000
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew build
